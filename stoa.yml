# ============================================================
# stoa.yml — Swarm Configuration
# ============================================================
# Each agent is an autonomous unit with a role, skills, and schedule.
# Agents coordinate through the mesh (memory/mesh/) — async message
# passing via git commits. No server, no database, no cost.
#
# Runtime: GitHub Actions (free tier = 2,000 min/month)
# LLM: Claude Code CLI (configure ANTHROPIC_API_KEY in repo secrets)
# Chain: Solana (configure SOLANA_RPC_URL and SOLANA_PRIVATE_KEY)
# ============================================================

version: 1

# --- Global Settings ---
defaults:
  model: claude-sonnet-4-20250514
  chain: solana
  rpc: ${SOLANA_RPC_URL}
  gateway: direct                    # direct | bankr (for cost optimization)
  commit: true                       # auto-commit memory/mesh changes

notifications:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
  discord:
    enabled: false
    webhook: ${DISCORD_WEBHOOK_URL}

# --- Agent Definitions ---
# Each agent has:
#   role: what it does (human-readable)
#   skills: list of skill directories it can execute
#   schedule: cron expression for autonomous ticks
#   model: optional LLM override
#   var: runtime variables passed to skills

agents:
  scout:
    role: "Onchain intelligence — monitors tokens, pools, whale wallets, and emerging signals on Solana"
    skills:
      - scan-tokens
      - morning-brief
    schedule: "*/30 * * * *"         # every 30 min
    var:
      watch_tokens: ["SOL", "JUP", "JTO", "PYTH", "RAY", "DRIFT"]
      whale_threshold_usd: 50000
      dex: ["raydium", "orca", "meteora", "jupiter"]

  analyst:
    role: "Signal processing — evaluates scout findings, scores opportunities, generates trade theses"
    skills:
      - analyze-signal
    schedule: "0 * * * *"            # every hour
    triggers:
      - on: mesh                     # also runs when scout posts a message
        from: scout
        type: signal
    var:
      min_confidence: 0.7
      strategy: ["momentum", "mean-reversion", "narrative"]

  executor:
    role: "Trade execution — acts on analyst recommendations via Solana programs"
    skills:
      - execute-trade
    schedule: null                   # reactive only, no cron
    triggers:
      - on: mesh
        from: analyst
        type: trade-signal
    var:
      max_position_usd: 100
      slippage_bps: 50
      protocols: ["jupiter", "raydium"]

  guardian:
    role: "Risk management — monitors open positions, enforces stop-losses, checks portfolio health"
    skills:
      - check-risk
    schedule: "*/15 * * * *"         # every 15 min
    var:
      max_drawdown_pct: 15
      max_portfolio_exposure_pct: 80
      alert_on_liquidation_risk: true

# --- Mesh Configuration ---
# Agents communicate by writing JSON messages to memory/mesh/{to}.json
# The dispatch system delivers messages on the recipient's next tick.
mesh:
  max_history: 50                    # messages per agent inbox
  ttl_hours: 24                      # auto-expire old messages

# --- Swarm Rules ---
# Global constraints that override individual agent behavior.
rules:
  - "Never execute a trade without analyst confirmation (confidence >= min_confidence)"
  - "Guardian can veto any executor action by posting a halt message"
  - "All state changes must be committed to memory/ with timestamps"
  - "No agent may spend more than max_position_usd per trade"
  - "If guardian detects drawdown > max_drawdown_pct, all agents enter cooldown mode"
