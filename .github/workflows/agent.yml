name: Stoa Agent with DeepSeek Direct

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent name (scout, analyst, executor, guardian, etc.)"
        required: true
        type: string
      skill:
        description: "Skill to execute (e.g., scan-tokens, build-website)"
        required: true
        type: string
      prompt:
        description: "Additional prompt or task details"
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: stoa-agent-${{ inputs.agent }}
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Call DeepSeek API directly
        env:
          DEEPSEEK_API_KEY: ${{ secrets.NCQ_DEEPSEEK_AI_KEY }}
        run: |
          # بناء المهمة بشكل آمن
          TASK="Agent: ${{ inputs.agent }}
          Skill: ${{ inputs.skill }}
          ${{ inputs.prompt }}"
          
          # استخدام jq لإنشاء JSON صحيح
          JSON_PAYLOAD=$(jq -n \
            --arg model "deepseek-chat" \
            --arg content "$TASK" \
            '{model: $model, messages: [{role: "user", content: $content}]}')
          
          echo "=== Sending to DeepSeek API ==="
          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d "$JSON_PAYLOAD")
          
          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE"
          
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "خطأ: لا يوجد رد"')
          echo "=== PARSED CONTENT ==="
          echo "$CONTENT"
          
          echo "$CONTENT" > response.txt

      - name: Upload response as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-response-${{ inputs.agent }}-${{ inputs.skill }}
          path: response.txt

      - name: Commit response to memory (optional)
        run: |
          git config user.name "stoa[bot]"
          git config user.email "stoa[bot]@users.noreply.github.com"
          mkdir -p memory/${{ inputs.agent }}
          cp response.txt memory/${{ inputs.agent }}/${{ inputs.skill }}_$(date -u +%Y%m%dT%H%M%SZ).txt
          git add memory/ 2>/dev/null || true
          if ! git diff --staged --quiet 2>/dev/null; then
            git commit -m "${{ inputs.agent }}: ${{ inputs.skill }} response @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main && git push || echo "Push failed, continuing"
          fi
